services:
  - type: web
    name: cobalt-api
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts
    startCommand: pnpm --filter @imput/cobalt-api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
      - key: API_LISTEN_ADDRESS
        value: 0.0.0.0
